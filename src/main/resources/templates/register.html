<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header text-center">

                    <h3>Đăng ký tài khoản</h3>

                </div>

                <div class="card-body">
                    <div class="alert alert-danger"
                        th:if="${error}"
                        th:text="${error}">
                    </div>

                    <div class="alert alert-success"
                        th:if="${success}"
                        th:text="${success}">
                    </div>
                    
                    <form th:action="@{/register}"
                        th:object="${user}"
                        method="post">

                        <div class="mb-3">

                            <label>Họ và tên</label>

                            <input
                                    type="text"
                                    class="form-control"
                                    th:field="*{fullName}">

                        </div>

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                    type="email"
                                    class="form-control"
                                    th:field="*{email}">

                        </div>

                        <div class="mb-3">

                            <label>Mật khẩu</label>

                            <input
                                    type="password"
                                    class="form-control"
                                     th:field="*{password}">

                        </div>

                        <button
                            type="submit"
                            class="btn btn-danger w-100">

                            Đăng ký

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
