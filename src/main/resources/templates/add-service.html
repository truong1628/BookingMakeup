<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm dịch vụ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">
            <h3>Thêm dịch vụ mới</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/service}"
            th:object="${service}"
            method="post">

                <div class="mb-3">
                    <label>Tên dịch vụ</label>
                    <input
                            type="text"
                            th:field="*{serviceName}"
                            class="form-control">
                </div>

                <div class="mb-3">
                    <label>Giá</label>
                    <input
                            type="number"
                            th:field="*{price}"
                            class="form-control">
                </div>

                <div class="mb-3">
                    <label>Thời gian (phút)</label>
                    <input
                            type="number"
                            th:field="*{duration}"
                            class="form-control">
                </div>

                <div class="mb-3">
                    <label>Ảnh</label>
                    <input
                            type="text"
                            th:field="*{image}"
                            class="form-control">
                </div>

                <div class="mb-3">
                    <label>Mô tả</label>

                    <textarea
                            th:field="*{description}"
                            class="form-control"
                            rows="4"></textarea>
                </div>

                <button class="btn btn-success">
                    Lưu dịch vụ
                </button>

                <a href="/admin/services"
                   class="btn btn-secondary">
                    Quay lại
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
