<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Đăng nhập Makeup Artist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header text-center">

                    <h3>Đăng nhập Makeup Artist</h3>

                </div>

                <div class="card-body">

                    <!-- Thông báo lỗi -->
                    <div class="alert alert-danger"
                         th:if="${error}"
                         th:text="${error}">
                    </div>

                    <form th:action="@{/artist/login}"
                          method="post">

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    placeholder="Nhập email"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Mật khẩu
                            </label>

                            <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="Nhập mật khẩu"
                                    required>

                        </div>

                        <button
                                type="submit"
                                class="btn btn-primary w-100">

                            Đăng nhập

                        </button>

                    </form>

                </div>

                <div class="card-footer text-center">

                    <a th:href="@{/}">
                        ← Quay về trang chủ
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
