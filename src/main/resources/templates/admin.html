<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Quản lý lịch đặt</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">
Quản lý lịch đặt
</h2>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>ID</th>

<th>Khách hàng</th>

<th>Dịch vụ</th>

<th>Ngày</th>

<th>Giờ</th>

<th>Trạng thái</th>

<th>Thao tác</th>

</tr>

</thead>

<tbody>

<tr th:each="booking : ${bookings}">

<td th:text="${booking.id}"></td>

<td th:text="${booking.user.fullName}"></td>

<td th:text="${booking.service.serviceName}"></td>

<td th:text="${booking.bookingDate}"></td>

<td th:text="${booking.bookingTime}"></td>

<td th:text="${booking.status}"></td>

<td>

<a th:href="@{/admin/confirm/{id}(id=${booking.id})}"
class="btn btn-success btn-sm">

Xác nhận

</a>

<a th:href="@{/admin/cancel/{id}(id=${booking.id})}"
class="btn btn-danger btn-sm">

Hủy

</a>

</td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
