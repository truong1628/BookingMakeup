<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý lịch đặt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="mb-4 fw-bold">Quản lý lịch đặt</h2>
      <div class="mb-3">
      <a href="/admin/services" class="btn btn-primary">
            Quản lý dịch vụ
      </a>

      <a href="/admin/artists" class="btn btn-success">
            Quản lý Makeup Artist
      </a>
      </div>
    <div class="row g-3 row-cols-1 row-cols-sm-2 row-cols-md-5 mb-4">
        <div class="col">
            <div class="card text-bg-primary h-100 border-0 shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-subtitle mb-2 opacity-75 text-uppercase fs-7">Tổng lịch</h6>
                    <h2 class="card-title mb-0 fw-bold" th:text="${totalBookings}">0</h2>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card text-bg-warning h-100 border-0 shadow-sm">
                <div class="card-body text-center text-dark">
                    <h6 class="card-subtitle mb-2 opacity-75 text-uppercase fs-7">Chờ xác nhận</h6>
                    <h2 class="card-title mb-0 fw-bold" th:text="${pendingBookings}">0</h2>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card text-bg-success h-100 border-0 shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-subtitle mb-2 opacity-75 text-uppercase fs-7">Đã xác nhận</h6>
                    <h2 class="card-title mb-0 fw-bold" th:text="${confirmedBookings}">0</h2>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card text-bg-info text-white h-100 border-0 shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-subtitle mb-2 opacity-75 text-uppercase fs-7">Đã hoàn thành</h6>
                    <h2 class="card-title mb-0 fw-bold" th:text="${completedBookings}">0</h2>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card text-bg-danger h-100 border-0 shadow-sm">
                <div class="card-body text-center">
                    <h6 class="card-subtitle mb-2 opacity-75 text-uppercase fs-7">Đã hủy</h6>
                    <h2 class="card-title mb-0 fw-bold" th:text="${cancelledBookings}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Bảng danh sách lịch đặt -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>Khách hàng</th>
                        <th>Dịch vụ</th>
                        <th>Makeup Artist</th>
                        <th>Ngày</th>
                        <th>Giờ</th>
                        <th class="text-center">Trạng thái</th>
                        <th class="text-end pe-3">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td class="ps-3 fw-semibold" th:text="${booking.id}"></td>
                        <td th:text="${booking.user.fullName}"></td>
                        <td th:text="${booking.service.serviceName}"></td>
                        <td th:text="${booking.artist.fullName}"></td>
                        <td th:text="${booking.bookingDate}"></td>
                        <td th:text="${booking.bookingTime}"></td>
                        
                        <!-- Cột Trạng thái dạng Badge trực quan -->
                        <td class="text-center">
                            <span th:if="${booking.status == 'Pending'}" class="badge rounded-pill text-bg-warning px-3 py-2">Chờ xác nhận</span>
                            <span th:if="${booking.status == 'Confirmed'}" class="badge rounded-pill text-bg-success px-3 py-2">Đã xác nhận</span>
                            <span th:if="${booking.status == 'Completed'}" class="badge rounded-pill text-bg-primary px-3 py-2">Đã hoàn thành</span>
                            <span th:if="${booking.status == 'Cancelled'}" class="badge rounded-pill text-bg-danger px-3 py-2">Đã hủy</span>
                        </td>
                        
                        <!-- Cột Thao tác -->
                        <td class="text-end pe-3">
                            <!-- Hành động khi ở trạng thái Chờ xác nhận (Pending) -->
                            <div th:if="${booking.status == 'Pending'}" class="btn-group" role="group">
                                <form th:action="@{/admin/{id}/confirm(id=${booking.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-success btn-sm me-1">Xác nhận</button>
                                </form>
                                <form th:action="@{/admin/{id}/cancel(id=${booking.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-outline-danger btn-sm" 
                                            onclick="return confirm('Bạn có chắc chắn muốn hủy lịch đặt này không?')">Hủy</button>
                                </form>
                            </div>

                            <!-- Hành động khi ở trạng thái Đã xác nhận (Confirmed) -->
                            <div th:if="${booking.status == 'Confirmed'}" class="btn-group" role="group">
                                <form th:action="@{/admin/{id}/complete(id=${booking.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-primary btn-sm me-1">Hoàn thành</button>
                                </form>
                                <form th:action="@{/admin/{id}/cancel(id=${booking.id})}" method="post" style="display:inline;">
                                    <!-- Giữ nguyên method PUT ẩn nếu Backend của bạn yêu cầu PUT cho hủy lịch -->
                                    <input type="hidden" name="_method" value="put">
                                    <button type="submit" class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('Bạn có chắc muốn hủy lịch?')">Hủy</button>
                                </form>
                            </div>

                            <!-- Không hiển thị nút bấm khi đã hoàn thành hoặc đã hủy -->
                            <span th:if="${booking.status == 'Completed' or booking.status == 'Cancelled'}" class="text-muted fs-7">
                                Không có thao tác
                            </span>
                        </td>
                    </tr>
                    <!-- Hiển thị dòng này nếu danh sách rỗng -->
                    <tr th:if="${#lists.isEmpty(bookings)}">
                        <td colspan="8" class="text-center py-4 text-muted">Không có lịch đặt nào được tìm thấy.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
