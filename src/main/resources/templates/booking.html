<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đặt lịch Makeup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-header bg-danger text-white text-center">
                    <h3>Đặt lịch Makeup</h3>
                </div>

                <div class="card-body">

                    <!-- Thông tin dịch vụ -->
                    <div class="mb-4">

                        <img th:src="@{/images/{img}(img=${service.image})}"
                             class="img-fluid rounded mb-3"
                             style="max-height:300px; width:100%; object-fit:cover;">

                        <h4 th:text="${service.serviceName}"></h4>

                        <p>
                            <strong>Giá:</strong>
                            <span th:text="${service.price}"></span>
                            VNĐ
                        </p>

                        <p>
                            <strong>Thời gian:</strong>
                            <span th:text="${service.duration}"></span>
                            phút
                        </p>

                        <p th:text="${service.description}"></p>

                    </div>

                    <hr>

                    <!-- Form đặt lịch -->
                    <form th:action="@{/booking}"
                          th:object="${booking}"
                          method="post">

                        <!-- Lưu id dịch vụ -->
                        <input type="hidden"
                               name="serviceId"
                               th:value="${service.id}">

                            <div class="mb-3">

                            <label class="form-label">
                                Chọn Makeup Artist
                            </label>

                            <select class="form-select"
                                    name="artistId"
                                    required>

                                <option value="">
                                    -- Chọn Makeup Artist --
                                </option>

                                <option th:each="artist : ${artists}"
                                        th:value="${artist.id}"
                                        th:text="${artist.fullName}">
                                </option>

                            </select>

                        </div>
                        <div class="mb-3">

                            <label class="form-label">
                                Ngày đặt
                            </label>

                            <input type="date"
                                class="form-control"
                                th:field="*{bookingDate}"
                                th:min="${today}"                                
                                required>

                            <div class="text-danger mt-1"
                                th:if="${#fields.hasErrors('bookingDate')}"
                                th:errors="*{bookingDate}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Giờ đặt
                            </label>

                            <input type="time"
                                class="form-control"
                                th:field="*{bookingTime}"
                                step="1800"
                                required>

                            <div class="text-danger mt-1"
                                th:if="${#fields.hasErrors('bookingTime')}"
                                th:errors="*{bookingTime}">
                            </div>

                        </div>
                        

                        <button type="submit"
                                class="btn btn-danger w-100">

                            📅 Xác nhận đặt lịch

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
