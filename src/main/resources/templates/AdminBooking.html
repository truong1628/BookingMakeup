<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Quản lý lịch đặt</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">
Quản lý lịch đặt
</h2>

<table class="table table-bordered">

<thead>

<tr>

<th>Khách hàng</th>
<th>Dịch vụ</th>
<th>Makeup Artist</th>
<th>Ngày</th>
<th>Giờ</th>
<th>Trạng thái</th>
<th>Thao tác</th>

</tr>

</thead>

<tbody>

<tr th:each="booking : ${bookings}">

<td th:text="${booking.user.fullName}"></td>

<td th:text="${booking.service.serviceName}"></td>

<td th:text="${booking.artist.fullName}"></td>

<td th:text="${booking.bookingDate}"></td>

<td th:text="${booking.bookingTime}"></td>

<td>

<span class="badge bg-warning"
th:if="${booking.status=='Pending'}">

Pending

</span>

<span class="badge bg-success"
th:if="${booking.status=='Confirmed'}">

Confirmed

</span>

<span class="badge bg-primary"
th:if="${booking.status=='Completed'}">

Completed

</span>

<span class="badge bg-danger"
th:if="${booking.status=='Cancelled'}">

Cancelled

</span>

</td>

<td>

<form
th:if="${booking.status=='Pending'}"
th:action="@{/admin/booking/{id}/confirm(id=${booking.id})}"
method="post"
style="display:inline">

<input type="hidden" name="_method" value="put">
<button class="btn btn-success btn-sm">

Xác nhận

</button>

</form>

<form
th:if="${booking.status=='Confirmed'}"
th:action="@{/booking/admin/{id}/complete(id=${booking.id})}"
method="post"
style="display:inline">

<button class="btn btn-primary btn-sm">

Hoàn thành

</button>

</form>

<form
th:if="${booking.status!='Completed'}"
th:action="@{/admin/booking/{id}/cancel(id=${booking.id})}"
method="post"
style="display:inline">

<input type="hidden" name="_method" value="put">
<button class="btn btn-danger btn-sm">

Hủy

</button>

</form>

</td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
