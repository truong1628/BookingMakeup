<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết dịch vụ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-6">

            <img th:src="@{/images/{img}(img=${service.image})}"
            class="img-fluid rounded">

        </div>

        <div class="col-md-6">

            <h2 th:text="${service.serviceName}"></h2>

            <h4 class="text-danger mt-3">
                <span th:text="${service.price}"></span> VNĐ
            </h4>

            <p class="mt-3">
                <strong>Thời gian:</strong>
                <span th:text="${service.duration}"></span> phút
            </p>

            <p th:text="${service.description}"></p>

            <button class="btn btn-danger btn-lg">
                Đặt lịch ngay
            </button>

        </div>

    </div>

</div>

</body>
</html>
