<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Lịch của tôi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Lịch của tôi</h2>

    <table class="table table-bordered table-striped">

        <thead>

        <tr>

            <th>Dịch vụ</th>
            <th>Makeup Artist</th>
            <th>Ngày</th>
            <th>Giờ</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="booking : ${bookings}">

            <td th:text="${booking.service.serviceName}"></td>

            <td th:text="${booking.artist != null ? booking.artist.fullName : 'Chưa có'}"></td>
            
            <td th:text="${booking.bookingDate}"></td>

            <td th:text="${booking.bookingTime}"></td>

            <td th:text="${booking.status}"></td>

            <td>

                <form
                    th:if="${booking.status == 'PENDING'}"
                    th:action="@{/booking/{id}(id=${booking.id})}"
                    method="post"
                    style="display:inline">

                    <input
                        type="hidden"
                        name="_method"
                        value="delete">

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="return confirm('Bạn có chắc muốn hủy lịch?')">

                        Hủy lịch

                    </button>

                </form>

                <span
                    th:if="${booking.status != 'PENDING'}"
                    class="text-secondary">

                    Đã tiếp nhận 

                </span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
