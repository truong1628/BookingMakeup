<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sửa dịch vụ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Sửa dịch vụ</h2>

    <form th:action="@{/service/{id}(id=${service.id})}"
          th:object="${service}"
          method="post">

        <input type="hidden"
               name="_method"
               value="put">

        <div class="mb-3">
            <label>Tên dịch vụ</label>

            <input class="form-control"
                   th:field="*{serviceName}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('serviceName')}"
                 th:errors="*{serviceName}">
            </div>
        </div>

        <div class="mb-3">
            <label>Giá</label>

            <input type="number"
                   class="form-control"
                   th:field="*{price}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('price')}"
                 th:errors="*{price}">
            </div>
        </div>

        <div class="mb-3">
            <label>Thời gian</label>

            <input type="number"
                   class="form-control"
                   th:field="*{duration}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('duration')}"
                 th:errors="*{duration}">
            </div>
        </div>

        <div class="mb-3">
            <label>Ảnh</label>

            <input class="form-control"
                   th:field="*{image}">

            <div class="text-danger"
                 th:if="${#fields.hasErrors('image')}"
                 th:errors="*{image}">
            </div>
        </div>

        <div class="mb-3">
            <label>Mô tả</label>

            <textarea class="form-control"
                      th:field="*{description}"
                      rows="4"></textarea>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}">
            </div>
        </div>

        <button class="btn btn-primary">
            Cập nhật
        </button>

        <a th:href="@{/admin/services}"
           class="btn btn-secondary">
            Quay lại
        </a>

    </form>

</div>

</body>
</html>
