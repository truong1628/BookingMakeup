<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Quản lý Makeup Artist</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Quản lý Makeup Artist</h2>

<a href="/admin" class="btn btn-secondary mb-3">
    ← Quay lại
</a>

<table class="table table-bordered table-striped">

<thead>

<tr>

<th>ID</th>
<th>Ảnh</th>
<th>Họ tên</th>
<th>SĐT</th>
<th>Kinh nghiệm</th>
<th>Mô tả</th>

</tr>

</thead>

<tbody>

<tr th:each="artist : ${artists}">

<td th:text="${artist.id}"></td>

<td>

<img th:src="@{'/uploads/' + ${artist.image}}"
     width="80">

</td>

<td th:text="${artist.fullName}"></td>

<td th:text="${artist.phone}"></td>

<td th:text="${artist.experience}"></td>

<td th:text="${artist.description}"></td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
