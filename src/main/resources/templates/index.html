<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Booking Makeup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="#">
            💄 Booking Makeup
        </a>

        <div>

            <a class="btn btn-outline-light me-2">
                Đăng nhập
            </a>

            <a class="btn btn-warning">
                Đăng ký
            </a>

        </div>

    </div>
</nav>

<section class="py-5 bg-light">

    <div class="container text-center">

        <h1 class="display-4">
            Đặt lịch Makeup Chuyên Nghiệp
        </h1>

        <p class="lead">

            Đặt lịch nhanh chóng với các Makeup Artist uy tín.

        </p>

        <button class="btn btn-danger btn-lg">
            Đặt lịch ngay
        </button>

    </div>

</section>
<section class="container py-5">

    <h2 class="text-center mb-4">
        Dịch vụ nổi bật
    </h2>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="service : ${services}">

            <div class="card h-100 shadow">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${service.serviceName}">
                    </h5>

                    <p class="card-text"
                       th:text="${service.description}">
                    </p>

                    <p>
                        <strong>Giá:</strong>
                        <span th:text="${service.price}">
                        </span>
                        VNĐ
                    </p>

                    <p>
                        <strong>Thời gian:</strong>
                        <span th:text="${service.duration}">
                        </span>
                        phút
                    </p>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
