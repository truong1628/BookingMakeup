<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Booking Makeup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="#">
            💄 Booking Makeup
        </a>

        <div th:if="${loginUser == null}">

            <a th:href="@{/login}"
            class="btn btn-outline-light me-2">
                Đăng nhập
            </a>

            <a th:href="@{/register}"
            class="btn btn-warning">
                Đăng ký
            </a>

        </div>

        <div th:if="${loginUser != null}">

            <span class="text-white me-3">
                Xin chào,
                <b th:text="${loginUser.fullName}"></b>
            </span>

            <a th:href="@{/logout}"
            class="btn btn-danger">
                Đăng xuất
            </a>

        </div>
        

    </div>
</nav>

<section class="py-5 bg-light">

    <div class="container text-center">

        <h1 class="display-4">
            Đặt lịch Makeup Chuyên Nghiệp
        </h1>

        <p class="lead">

            Đặt lịch nhanh chóng với các Makeup Artist uy tín.

        </p>

        <button class="btn btn-danger btn-lg">
            Đặt lịch ngay
        </button>

    </div>

</section>
<section class="container my-5">

    <h2 class="text-center mb-4">Dịch vụ nổi bật</h2>

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="service : ${services}">

            <div class="card h-100 shadow">

                <img th:src="@{/images/{img}(img=${service.image})}"
                    class="card-img-top"
                    alt="Ảnh dịch vụ"
                    style="height:250px; object-fit:cover;">

                <div class="card-body">

                    <h5 class="card-title"
                        th:text="${service.serviceName}">
                        Tên dịch vụ
                    </h5>

                    <p class="card-text">
                        <strong>Giá:</strong>

                        <span th:text="${service.price}">
                            0
                        </span>

                        VNĐ
                    </p>

                    <p class="card-text">
                        <strong>Thời gian:</strong>

                        <span th:text="${service.duration}">
                            0
                        </span>

                        phút
                    </p>

                    <p class="card-text"
                       th:text="${service.description}">
                        Mô tả
                    </p>

                    <a th:href="@{/service/{id}(id=${service.id})}"
                        class="btn btn-primary">
                        Xem chi tiết
                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
