<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${service.id == null ? 'Thêm dịch vụ' : 'Sửa dịch vụ'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">
            <h3 th:text="${service.id == null ? 'Thêm dịch vụ' : 'Sửa dịch vụ'}"></h3>
        </div>

        <div class="card-body">

           <!-- Sử dụng toán tử 3 ngôi và cú pháp truyền tham số chuẩn của Thymeleaf -->
        <form th:action="${service.id == null ? '/admin/services' : '/admin/services/' + service.id}"
            th:object="${service}"
            method="post">

            <!-- Thẻ ẩn này sẽ kích hoạt Filter của Spring để chuyển POST thành PUT -->
            <input th:if="${service.id != null}" type="hidden" name="_method" value="put">
            

                <div class="mb-3">
                    <label>Tên dịch vụ</label>
                    <input type="text"
                        th:field="*{serviceName}"
                        class="form-control">

                    <div class="text-danger"
                        th:if="${#fields.hasErrors('serviceName')}"
                        th:errors="*{serviceName}">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Giá</label>
                    <input type="number"
                        th:field="*{price}"
                        class="form-control">

                    <div class="text-danger"
                        th:if="${#fields.hasErrors('price')}"
                        th:errors="*{price}">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Thời gian (phút)</label>
                    <input type="number"
                        th:field="*{duration}"
                        class="form-control">

                    <div class="text-danger"
                        th:if="${#fields.hasErrors('duration')}"
                        th:errors="*{duration}">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Ảnh</label>
                    <input type="text"
                        th:field="*{image}"
                        class="form-control">

                    <div class="text-danger"
                        th:if="${#fields.hasErrors('image')}"
                        th:errors="*{image}">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Mô tả</label>
                    <textarea th:field="*{description}"
                            class="form-control"
                            rows="4"></textarea>

                    <div class="text-danger"
                        th:if="${#fields.hasErrors('description')}"
                        th:errors="*{description}">
                    </div>
                </div>

                <button type="submit" class="btn btn-success"
                        th:text="${service.id == null ? 'Thêm dịch vụ' : 'Cập nhật'}">
                </button>

                <a th:href="@{/admin/services}"
                class="btn btn-secondary">
                    Quay lại
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
