<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Phân công Makeup Artist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Phân công Makeup Artist</h3>
        </div>

        <div class="card-body">

            <p>
                <strong>Khách hàng:</strong>
                <span th:text="${booking.user.fullName}"></span>
            </p>

            <p>
                <strong>Dịch vụ:</strong>
                <span th:text="${booking.service.serviceName}"></span>
            </p>

            <p>
                <strong>Ngày:</strong>
                <span th:text="${booking.bookingDate}"></span>
            </p>

            <p>
                <strong>Giờ:</strong>
                <span th:text="${booking.bookingTime}"></span>
            </p>

            <hr>

            <form th:action="@{/admin/bookings/{id}/assign(id=${booking.id})}"
                  method="post">

                <div class="mb-3">

                    <label class="form-label">
                        Chọn Makeup Artist
                    </label>

                    <select
                            name="artistId"
                            class="form-select"
                            required>

                        <option value="">
                            -- Chọn Artist --
                        </option>

                        <option th:each="artist : ${artists}"
                                th:value="${artist.id}"
                                th:text="${artist.fullName}">
                        </option>

                    </select>

                </div>

                <button class="btn btn-success">
                    Phân công
                </button>

                <a th:href="@{/admin}"
                   class="btn btn-secondary">
                    Quay lại
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
