<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Quản lý dịch vụ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Quản lý dịch vụ</h2>

    <a th:href="@{/service/add}"
    class="btn btn-success">
        Thêm dịch vụ
    </a>
    <a th:href="@{/admin}"
        class="btn btn-secondary ms-2">
        Quay lại
    </a>

    <table class="table table-bordered">

        <thead>

        <tr>

            <th>ID</th>

            <th>Tên</th>

            <th>Giá</th>

            <th>Thời gian</th>

            <th>Ảnh</th>

            <th>Mô tả</th>

            <th>Thao tác</th>
            
        </tr>

        </thead>

        <tbody>
            <tr th:if="${#lists.isEmpty(services)}">
                <td colspan="7" class="text-center text-muted">
                    Chưa có dịch vụ nào.
                </td>
            </tr>

            <tr th:each="service : ${services}">

                <td th:text="${service.id}"></td>

                <td th:text="${service.serviceName}"></td>

                <td th:text="${#numbers.formatDecimal(service.price,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>

                <td>
                    <img th:src="@{/images/{img}(img=${service.image})}"
                        width="100"
                        height="70"
                        style="object-fit:cover">
                </td>

                <td th:text="${service.description}"></td>

                <td th:text="${service.duration}"></td>

                <td>

                    <a th:href="@{/service/edit/{id}(id=${service.id})}"
                    class="btn btn-warning btn-sm me-1">
                        Sửa
                    </a>

                    <form th:action="@{/service/{id}(id=${service.id})}"
                        method="post"
                        style="display:inline">

                        <input type="hidden"
                            name="_method"
                            value="delete">

                        <button type="submit"
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                            Xóa
                        </button>

                    </form>

                </td>

            </tr>

        </tbody>

    </table>

</div>

</body>

</html>
